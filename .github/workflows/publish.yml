name: Publish to npm

# Publishes @sunderrrr/opencode-setup to the public npm registry whenever a
# GitHub Release is published. Provenance is attached automatically
# (publishConfig.provenance + id-token permission).
#
# Setup once: create an npm automation token and add it as the repo secret
# NPM_TOKEN (Settings → Secrets and variables → Actions).

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Fail early if the published version differs from the release tag (vX.Y.Z).
      - name: Check version matches tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "package.json version ($PKG_VERSION) does not match release tag ($TAG)" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
